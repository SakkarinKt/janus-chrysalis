name: CI

# Seed CI for Phase 1 (docs-only). Today it lints Markdown; as executable
# code lands in Phase 2, add build/test/lint jobs here. The `lint` job's
# check is the first candidate to require via the `protect-main` ruleset.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: '**/*.md'
