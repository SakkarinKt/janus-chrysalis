name: CI

# Seed CI for Phase 1. Markdown lint plus a Node test job for the Arm-A
# milestone code under src/ and test/ (PR #10). The `lint` job's check is
# the current required check in the `protect-main` ruleset. `test` now
# installs dependencies and passes green (PR #15 review, 99e718d/c0399bc)
# but is NOT YET added as a required check there — adding it is a
# repo-settings change outside this loop's write scope (flagged in the
# 2026-07-16 stand-up for the human to action).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: '**/*.md'

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: package.json
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
